name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'web/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Publish
        run: dotnet publish src/AGI.Api/AGI.Api.csproj -c Release -o publish
      - uses: actions/upload-artifact@v4
        with:
          name: publish
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: publish
          path: deploy/

      - name: Upload release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: deploy/*
          target: /srv/agi/releases/${{ github.run_id }}
          strip_components: 1

      - name: Switch & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ln -sfn /srv/agi/releases/${{ github.run_id }} /srv/agi/current
            sudo systemctl restart agi
            cd /srv/agi/releases && ls -dt */ | tail -n +6 | xargs rm -rf
